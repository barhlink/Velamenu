<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Velamenu – Hloubětín Čtečka</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:         #1AABDC;
  --blue-dark:    #1490BC;
  --blue-light:   #E8F7FD;
  --blue-mid:     #C5E8F5;
  --yellow:       #F5C842;
  --green:        #4CB87A;
  --green-bg:     #EAF8F1;
  --green-border: rgba(76,184,122,0.25);
  --orange:       #F0882A;
  --orange-bg:    #FEF3E8;
  --orange-border:rgba(240,136,42,0.25);
  --red:          #E05050;
  --red-bg:       #FDF0F0;
  --red-border:   rgba(224,80,80,0.25);
  --text:         #2A5F7A;
  --text-light:   #6BAFC8;
  --text-hint:    #AACFDF;
  --bg:           #F4FBFF;
  --radius:       24px;
  --radius-sm:    14px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.app {
  width: 100%;
  max-width: 540px;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ======== HEADER ======== */
.header { background: var(--blue); padding: 20px 24px 0; flex-shrink: 0; }

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 16px;
}

.logo-area { display: flex; align-items: center; gap: 11px; }

.logo-circle {
  width: 46px; height: 46px;
  background: var(--yellow);
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(0,0,0,0.18);
}

.logo-circle svg { display: block; width: 100%; height: 100%; }
.logo-name { font-size: 24px; font-weight: 900; color: white; }

.location-tag {
  font-size: 11px; font-weight: 700;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1px;
}

.header-right { text-align: right; }
.header-clock { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.9); line-height: 1; }
.header-date  { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 3px; }

/* Stav připojení */
.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s;
}
.conn-dot.online  { background: #4CB87A; }
.conn-dot.offline { background: var(--orange); }

.conn-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); }

.wave { line-height: 0; margin-top: -1px; }
.wave svg { display: block; width: 100%; height: 44px; }

/* ======== STAGE ======== */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 20px 0;
  overflow: hidden;
  min-height: 0;
}

.view { display: none; flex-direction: column; height: 100%; }
.view.active { display: flex; }

/* ======== IDLE ======== */
#view-idle {
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.fp-outer {
  width: 130px; height: 130px;
  border-radius: 50%;
  background: rgba(26,171,220,0.07);
  display: flex; align-items: center; justify-content: center;
  animation: pulse 2.8s ease-in-out infinite;
}

.fp-inner {
  width: 94px; height: 94px;
  border-radius: 50%;
  background: var(--blue-light);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(26,171,220,0.18);
}

.fp-inner svg {
  width: 52px; height: 52px;
  stroke: var(--blue); fill: none;
  stroke-width: 1.4; stroke-linecap: round;
}

@keyframes pulse {
  0%,100% { transform: scale(1);     box-shadow: 0 0 0 0   rgba(26,171,220,0.2); }
  50%      { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(26,171,220,0); }
}

.idle-headline { font-size: 26px; font-weight: 900; color: var(--text); text-align: center; line-height: 1.2; }
.idle-sub { font-size: 15px; font-weight: 600; color: var(--text-light); text-align: center; }

/* ======== RESULT (rychlé potvrzení) ======== */
#view-result {
  align-items: center;
  justify-content: center;
}

.result-bubble {
  width: 100%;
  border-radius: var(--radius);
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 10px;
  animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.result-bubble.ok   { background: var(--green-bg);  border: 2px solid var(--green-border); }
.result-bubble.warn { background: var(--orange-bg); border: 2px solid var(--orange-border); }
.result-bubble.err  { background: var(--red-bg);    border: 2px solid var(--red-border); }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.9) translateY(16px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}

.bubble-icon  { font-size: 56px; line-height: 1; }

.bubble-badge {
  padding: 4px 18px;
  border-radius: 100px;
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
}

.ok   .bubble-badge { background: rgba(76,184,122,0.18);  color: #2A8A53; }
.warn .bubble-badge { background: rgba(240,136,42,0.18);  color: #B5600A; }
.err  .bubble-badge { background: rgba(224,80,80,0.18);   color: #A03030; }

.bubble-name {
  font-size: 20px; font-weight: 700;
  color: var(--text); line-height: 1.2;
}

/* Hlavní text — 28px konzistentně */
.bubble-meal {
  font-size: 28px; font-weight: 900;
  line-height: 1.2;
  overflow-wrap: break-word; hyphens: auto;
}

.ok   .bubble-meal { color: var(--green); }
.warn .bubble-meal { color: var(--orange); }
.err  .bubble-meal { color: var(--red); }

.bubble-meta { font-size: 13px; font-weight: 600; color: var(--text-light); }

/* Progress bar */
.mini-progress {
  width: 100%; height: 5px;
  background: rgba(0,0,0,0.07);
  border-radius: 3px; overflow: hidden;
  margin-top: 8px;
}

.mini-fill {
  height: 100%; border-radius: 3px;
  width: 100%; transition: width linear;
}

.ok   .mini-fill { background: var(--green); }
.warn .mini-fill { background: var(--orange); }
.err  .mini-fill { background: var(--red); }

/* Override panel */
.panel {
  flex: 1;
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--blue-mid);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.panel-head { background: var(--blue); padding: 18px 22px 14px; flex-shrink: 0; }
.panel-title { font-size: 17px; font-weight: 900; color: white; margin-bottom: 10px; }

.panel-search {
  width: 100%; padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: rgba(255,255,255,0.18);
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 600;
  color: white; outline: none; min-height: 48px;
}

.panel-search::placeholder { color: rgba(255,255,255,0.5); }
.panel-search:focus { background: rgba(255,255,255,0.28); }

.panel-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

.panel-item {
  padding: 16px 22px;
  border-bottom: 1px solid #EEF7FC;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; cursor: pointer;
  transition: background 0.1s;
  min-height: 64px;
}

.panel-item:last-child { border-bottom: none; }
.panel-item:hover  { background: var(--blue-light); }
.panel-item:active { background: var(--blue-mid); }

.panel-item-name { font-size: 16px; font-weight: 800; color: var(--text); }
.panel-item-sub  { font-size: 12px; font-weight: 600; color: var(--text-light); margin-top: 2px; }
.panel-item-arrow { font-size: 22px; color: var(--blue); font-weight: 700; flex-shrink: 0; }

.panel-empty { padding: 48px 22px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text-hint); }

.panel-cancel {
  flex-shrink: 0; width: 100%;
  padding: 16px; border: none;
  border-top: 1px solid #EEF7FC; background: none;
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--text-hint); cursor: pointer; min-height: 52px;
}

/* ======== BOTTOM BAR ======== */
.bottombar {
  flex-shrink: 0;
  padding: 10px 20px 28px;
  display: flex; gap: 10px;
}

.btn-bar {
  flex: 1; padding: 15px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--blue-mid);
  background: white;
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800;
  color: var(--blue-dark);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all 0.15s;
  min-height: 52px;
}

.btn-bar:hover  { background: var(--blue-light); border-color: var(--blue); }
.btn-bar:active { transform: scale(0.97); }

.btn-bar.highlighted {
  border-color: var(--red); background: var(--red-bg); color: var(--red);
  animation: wiggle 0.4s ease;
}

@keyframes wiggle {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-5px); }
  75%      { transform: translateX(5px); }
}

/* Offline banner */
.offline-banner {
  background: var(--orange);
  color: white;
  font-size: 12px; font-weight: 800;
  text-align: center;
  padding: 8px;
  display: none;
}

.offline-banner.show { display: block; }

/* Dev panel */
.dev-panel {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  align-items: flex-end; justify-content: center; padding: 20px;
}
.dev-panel.open { display: flex; }

.dev-box {
  background: white; border-radius: var(--radius);
  padding: 24px; width: 100%; max-width: 480px;
  display: flex; flex-direction: column; gap: 10px;
}

.dev-title {
  font-size: 13px; font-weight: 800;
  color: var(--text-hint);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
}

.dev-btn {
  padding: 14px 18px; border-radius: var(--radius-sm);
  border: 1.5px dashed var(--blue-mid); background: var(--blue-light);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--blue-dark); cursor: pointer; text-align: left; min-height: 52px;
}

.dev-btn:active { transform: scale(0.98); }

.dev-close {
  padding: 14px; border: none; background: none;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text-hint); cursor: pointer;
  border-top: 1px solid #EEF7FC; margin-top: 4px;
}

.location-tag { user-select: none; -webkit-user-select: none; }

.group-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; padding: 16px;
}
.group-btn {
  padding: 18px 8px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--blue-mid); background: var(--blue-light);
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900;
  color: var(--blue-dark); cursor: pointer; min-height: 60px;
  transition: all 0.12s;
}
.group-btn:hover  { background: var(--blue-mid); }
.group-btn:active { transform: scale(0.96); }
.group-btn.adults { grid-column: 1 / -1; background: white; border-color: var(--blue); }

.storno-item {
  padding: 14px 18px; border-bottom: 1px solid #FDF0F0;
  display: flex; align-items: center; gap: 10px;
}
.storno-btn {
  flex-shrink: 0; padding: 8px 14px; border-radius: 10px;
  border: none; background: var(--red-bg); color: var(--red);
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; min-height: 40px;
}
.storno-btn:active { transform: scale(0.96); }
</style>
</head>

<script>
// ======================================================
// KONFIGURACE — změň IP na adresu PC kde běží server
// ======================================================
const SERVER_IP   = "localhost"; // ← sem dej IP serveru
const SERVER_PORT = 3000;
const WS_URL      = `ws://${SERVER_IP}:${SERVER_PORT}`;

// Konfigurace 2N polling
// Polling běží přes proxy na server.js (vyhne se CORS)
// Pole fieldName odpovídá názvu v 2N API odpovědi — zpravidla "cardOrCode"
const CFG_2N = {
  enabled:   true,           // false → vypne polling (dev bez čtečky)
  fieldName: "cardOrCode",   // pole v 2N event objektu s ID otisku
  lastId:    0,              // ID posledního zpracovaného eventu
};

// ======================================================
// STAV
// ======================================================
let deti           = [];
let ws             = null;
let autoTimer      = null;
let countdownInt   = null;
let reconnectTimer = null;
let pollingPaused  = false; // debounce — pauza po otisku dokud se nevrátí idle
let pollInterval   = null;
let stornoLog      = []; // záznamy vydaných pro admin storno panel

// ======================================================
// HODINY
// ======================================================
function tick() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleTimeString("cs-CZ",{ hour:"2-digit", minute:"2-digit" });
  document.getElementById("datum").textContent =
    n.toLocaleDateString("cs-CZ",{ weekday:"short", day:"numeric", month:"numeric" });
}
tick(); setInterval(tick, 1000);

// ======================================================
// WEBSOCKET
// ======================================================
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConn(true);
    clearTimeout(reconnectTimer);
    start2NPoll();
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    setConn(false);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function setConn(online) {
  const dot    = document.getElementById("conn-dot");
  const label  = document.getElementById("conn-label");
  const banner = document.getElementById("offline-banner");
  dot.className   = "conn-dot " + (online ? "online" : "offline");
  label.textContent = online ? "připojeno" : "offline";
  banner.classList.toggle("show", !online);
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ======================================================
// ZPRACOVÁNÍ ZPRÁV ZE SERVERU
// ======================================================
function handleMessage(msg) {
  switch (msg.type) {
    case "init":
      deti = msg.deti || [];
      // Obnov stornoLog z iniciálního logu ze serveru
      stornoLog = (msg.log || []).map(l => ({ uuid: l.uuid, jmeno: l.jmeno, jidlo: l.jidlo, cas: l.cas, override: l.override }));
      break;

    case "result":
      if (msg.status === "ok" && msg.dite) {
        const cas = new Date().toLocaleTimeString("cs-CZ",{ hour:"2-digit", minute:"2-digit" });
        stornoLog.unshift({ uuid: msg.dite.uuid, jmeno: msg.dite.jmeno, jidlo: msg.dite.jidlo, cas, override: !!msg.override });
      }
      ukazVysledek(msg);
      break;

    case "storno":
      stornoLog = stornoLog.filter(i => i.uuid !== msg.uuid);
      break;

    case "pong":
      break;

    case "reset":
      stornoLog = [];
      goIdle();
      break;
  }
}

// ======================================================
// FINGERPRINT — vstupní bod z 2N API
// ======================================================
function onFingerprint(uuid) {
  if (pollingPaused) return;
  pollingPaused = true; // debounce — ignoruj další otisky dokud se nevrátí idle
  if (ws && ws.readyState === WebSocket.OPEN) {
    wsSend({ type: "fingerprint", uuid });
  } else {
    // Offline fallback — zobraz chybu
    ukazVysledek({ status: "err" });
  }
}

// ======================================================
// 2N POLLING — poll každou sekundu přes server proxy
// ======================================================
function start2NPoll() {
  if (!CFG_2N.enabled) return;
  clearInterval(pollInterval);
  pollInterval = setInterval(poll2N, 1000);
}

async function poll2N() {
  try {
    const res    = await fetch(`http://${SERVER_IP}:${SERVER_PORT}/api/2n-poll?id=${CFG_2N.lastId}`);
    const data   = await res.json();
    const events = data.events || [];
    set2nStatus(true);
    for (const ev of events) {
      if (ev.id > CFG_2N.lastId) CFG_2N.lastId = ev.id;
      const rawId = ev[CFG_2N.fieldName];
      if (rawId) onFingerprint(String(rawId).toLowerCase());
    }
  } catch {
    set2nStatus(false);
  }
}

function set2nStatus(ok) {
  const dot = document.getElementById("twon-dot");
  if (dot) dot.className = "conn-dot " + (ok ? "online" : "offline");
}

// ======================================================
// VIEWS
// ======================================================
function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
}

function goIdle() {
  clearAuto();
  pollingPaused = false;
  document.getElementById("btn-override").classList.remove("highlighted");
  showView("idle");
}

function goOverride() {
  clearAuto();
  showGroupStep();
  showView("override");
}

// ======================================================
// VÝSLEDEK
// ======================================================
function ukazVysledek(msg) {
  clearAuto();
  const { status, dite, vydanoCas } = msg;

  const bubble = document.getElementById("result-bubble");
  bubble.className = "result-bubble " + status;

  const cfg = {
    ok:   { icon:"✅", badge:"Dobrou chuť!",          name: dite?.jmeno, meal: dite?.jidlo,               meta: "Jídlo jde do výdeje 🍽️" },
    warn: { icon:"⚠️", badge:"Pozor",                  name: dite?.jmeno, meal: "Jídlo již bylo vydáno",   meta: vydanoCas ? "Vydáno v " + vydanoCas : "" },
    err:  { icon:"❓", badge:"Neznámý uživatel",       name: "",          meal: "Zkus přiložit znovu",     meta: "nebo použij Ruční výběr" },
  };

  const c = cfg[status] || cfg.err;
  document.getElementById("r-icon").textContent  = c.icon;
  document.getElementById("r-badge").textContent = c.badge;
  document.getElementById("r-name").textContent  = c.name || "";
  document.getElementById("r-meal").textContent  = c.meal;
  document.getElementById("r-meta").textContent  = c.meta;

  document.getElementById("btn-override").classList.remove("highlighted");
  if (status === "err") {
    setTimeout(() => document.getElementById("btn-override").classList.add("highlighted"), 500);
  }

  showView("result");

  // Auto-reset — čtečka má krátký čas, fronta čeká
  const dur = status === "ok" ? 4000 : status === "warn" ? 5000 : 0;
  if (dur > 0) {
    const fill = document.getElementById("r-fill");
    fill.style.transition = "none";
    fill.style.width = "100%";
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fill.style.transition = `width ${dur/1000}s linear`;
      fill.style.width = "0%";
    }));
    autoTimer = setTimeout(goIdle, dur);
  }
}

function clearAuto() { clearTimeout(autoTimer); clearInterval(countdownInt); }

// ======================================================
// OVERRIDE — 2-krokový výběr: skupiny → děti
// ======================================================
function showGroupStep() {
  document.getElementById("override-title").textContent = "Ruční výběr dítěte";
  document.getElementById("override-cancel-btn").textContent = "Zrušit";
  document.getElementById("override-cancel-btn").onclick = goIdle;

  const groups = [...new Set(deti.map(d => d.trida || "—"))].sort((a, b) => {
    if (a === "Dospělí") return 1;
    if (b === "Dospělí") return -1;
    return a.localeCompare(b, "cs");
  });

  const step = document.getElementById("override-step-groups");
  const kids = document.getElementById("override-step-kids");
  kids.style.display  = "none";
  step.style.display  = "block";

  step.innerHTML = `<div class="group-grid">
    ${groups.map(g => `
      <button class="group-btn${g === "Dospělí" ? " adults" : ""}" onclick="showKidsStep('${g}')">${g}</button>
    `).join("")}
  </div>`;
}

function showKidsStep(trida) {
  document.getElementById("override-title").textContent = trida;
  document.getElementById("override-cancel-btn").textContent = "← Skupiny";
  document.getElementById("override-cancel-btn").onclick = showGroupStep;

  const step = document.getElementById("override-step-groups");
  const kids = document.getElementById("override-step-kids");
  step.style.display = "none";
  kids.style.display = "block";

  const seznam = deti.filter(d => (d.trida || "—") === trida);
  kids.innerHTML = seznam.length === 0
    ? '<div class="panel-empty">Nikdo nenalezen</div>'
    : seznam.map(d => `
        <div class="panel-item" onclick="overrideVydej('${d.uuid}')">
          <div style="min-width:0;">
            <div class="panel-item-name">${d.jmeno}</div>
            <div class="panel-item-sub">${d.jidlo}</div>
          </div>
          <div class="panel-item-arrow">›</div>
        </div>`).join("");
}

function overrideVydej(uuid) {
  wsSend({ type: "override", uuid });
  goIdle();
}

// ======================================================
// ADMIN STORNO — long-press 3s na location-tag
// ======================================================
let stornoTimer = null;

document.getElementById("location-tag").addEventListener("pointerdown", () => {
  stornoTimer = setTimeout(openStorno, 3000);
});
document.getElementById("location-tag").addEventListener("pointerup",    () => clearTimeout(stornoTimer));
document.getElementById("location-tag").addEventListener("pointerleave", () => clearTimeout(stornoTimer));

function openStorno() {
  // Načte dnešní log ze serveru — zobrazíme to, co víme ze zpráv "result"
  // logItems se plní při každém "result:ok" přijatém od serveru
  const list = document.getElementById("storno-list");
  if (stornoLog.length === 0) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-hint);font-weight:700;">Dnes ještě nikdo nevydán.</div>';
  } else {
    list.innerHTML = stornoLog.map(i => `
      <div class="storno-item">
        <div style="flex:1;min-width:0;">
          <div style="font-size:15px;font-weight:800;color:var(--text);">${i.jmeno}</div>
          <div style="font-size:12px;font-weight:600;color:var(--text-light);">${i.jidlo} · ${i.cas || ""}${i.override ? ' · ručně' : ''}</div>
        </div>
        <button class="storno-btn" onclick="doStorno('${i.uuid}')">Storno</button>
      </div>`).join("");
  }
  document.getElementById("storno-panel").classList.add("open");
}

function closeStorno() {
  document.getElementById("storno-panel").classList.remove("open");
}

function doStorno(uuid) {
  wsSend({ type: "storno", uuid });
  stornoLog = stornoLog.filter(i => i.uuid !== uuid);
  closeStorno();
}

// ======================================================
// DEV PANEL (podržet logo 2s)
// ======================================================
let logoTimer = null;
document.getElementById("logo-btn").addEventListener("pointerdown", () => {
  logoTimer = setTimeout(() => document.getElementById("dev-panel").classList.add("open"), 2000);
});
document.getElementById("logo-btn").addEventListener("pointerup",    () => clearTimeout(logoTimer));
document.getElementById("logo-btn").addEventListener("pointerleave", () => clearTimeout(logoTimer));

function closedev() { document.getElementById("dev-panel").classList.remove("open"); }
function devSim(uuid) { onFingerprint(uuid); }

// ======================================================
// INIT
// ======================================================
connect();
showView("idle");
</script>
